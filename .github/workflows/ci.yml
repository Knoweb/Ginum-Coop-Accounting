name: CI Build Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  backend-build:
    name: Backend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Compile Backend
        run: |
          cd ginum-backend-main
          mvn -B clean compile

      - name: Run Backend Tests
        run: |
          cd ginum-backend-main
          # Skipping tests because they require a live MySQL database connection.
          # We validate that the code compiles via 'mvn package' instead.
          mvn -B package -DskipTests

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ginum-frontend-main/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd ginum-frontend-main
          npm ci || npm install

      - name: Build Frontend
        env:
          VITE_API_URL: "http://localhost:8081/api"
        run: |
          cd ginum-frontend-main
          npm run build

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Mock .env for Docker Check
        run: |
          cp .env.example .env
          echo "VITE_API_URL=http://localhost:8081/api" >> .env

      - name: Validate Docker Compose Config
        run: docker compose config

      - name: Build Docker Images (Dry Run)
        run: docker compose build
